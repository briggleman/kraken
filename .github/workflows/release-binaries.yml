name: release-binaries

# Attach cross-platform binaries to a GitHub Release. Invoked as a reusable
# workflow from release-please.yml when release-please cuts a new release,
# and available as a manual workflow_dispatch for rebuilds against an
# existing tag.
#
# For each supported OS/arch, cross-compile panel/agent/krakenctl with
# -ldflags stamping the tag, commit SHA, and build date into
# internal/shared/version. Then upload the binaries + a SHA256SUMS file as
# release assets so operators can `curl` a specific version onto a node
# without running `go build` themselves.

on:
  workflow_call:
    inputs:
      tag_name:
        description: 'Release tag to build binaries for (e.g. v0.4.0)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to build binaries for (e.g. v0.4.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ inputs.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, ext: "" }
          - { goos: linux,   goarch: arm64, ext: "" }
          - { goos: windows, goarch: amd64, ext: ".exe" }
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out at the tagged commit so version stamping matches.
          ref: ${{ inputs.tag_name }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Build the web UI once, up-front, so every cross-compiled Panel binary
      # embeds the same assets via //go:embed all:dist. Vite writes into
      # internal/panel/webui/dist (see web/vite.config.ts).
      - name: web build
        run: npm ci && npm run build
        working-directory: web

      - name: cross-compile
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          TAG: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          COMMIT="${GITHUB_SHA:0:12}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          MOD="github.com/briggleman/kraken/internal/shared/version"
          LDFLAGS="-s -w -X ${MOD}.Version=${VERSION} -X ${MOD}.Commit=${COMMIT} -X ${MOD}.Date=${DATE}"
          mkdir -p dist
          for cmd in panel agent krakenctl; do
            OUT="dist/kraken-${cmd}-${GOOS}-${GOARCH}${{ matrix.ext }}"
            go build -trimpath -ldflags "${LDFLAGS}" -o "${OUT}" "./cmd/${cmd}"
            echo "built ${OUT}"
          done
          ls -la dist/

      - name: upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag_name }}
        run: gh release upload "${TAG}" dist/* --clobber --repo "${{ github.repository }}"

  checksums:
    name: sha256sums
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cd dist
          gh release download "${TAG}" \
            --repo "${{ github.repository }}" \
            --pattern "kraken-*"
          ls -la

      - name: generate + upload SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail
          cd dist
          sha256sum kraken-* > SHA256SUMS
          cat SHA256SUMS
          gh release upload "${TAG}" SHA256SUMS --clobber --repo "${{ github.repository }}"
