name: release-images

# Build + publish the Panel and Agent container images to GHCR on every
# GitHub Release (release-please auto-creates one when its "chore(main):
# release X.Y.Z" PR merges). Tags:
#   - vX.Y.Z (the exact release tag)
#   - latest (points to the newest release)
#
# The workflow_dispatch trigger lets a maintainer rebuild manually
# (e.g. to refresh :latest against updated base images).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: release-images-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

env:
  PANEL_IMAGE: ghcr.io/${{ github.repository_owner }}/kraken-panel
  AGENT_IMAGE: ghcr.io/${{ github.repository_owner }}/kraken-agent

jobs:
  panel:
    name: panel image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PANEL_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/panel.Dockerfile
          push: true
          build-args: |
            VERSION=${{ github.event.release.tag_name || github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.repository.updated_at }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=panel-image
          cache-to: type=gha,mode=max,scope=panel-image

  agent:
    name: agent image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AGENT_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/agent.Dockerfile
          push: true
          build-args: |
            VERSION=${{ github.event.release.tag_name || github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.repository.updated_at }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=agent-image
          cache-to: type=gha,mode=max,scope=agent-image
