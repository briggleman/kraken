name: release-images

# Build + publish the Panel and Agent container images to GHCR for a given
# tag. Invoked as a reusable workflow from release-please.yml when a new
# release is cut, and available as manual workflow_dispatch for rebuilds
# against an existing tag (e.g. refreshing :latest against updated base
# images without cutting a new release).
#
# Tags produced per image:
#   - latest                (points to the newest release)
#   - vX.Y.Z                (raw git tag with the v prefix)
#   - X.Y.Z                 (canonical semver, no v prefix)
#   - X.Y                   (major.minor floating tag)
#   - sha-<short>           (commit-level pin)

on:
  workflow_call:
    inputs:
      tag_name:
        description: 'Release tag to build images for (e.g. v0.4.0)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to build images for (e.g. v0.4.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-images-${{ inputs.tag_name }}
  cancel-in-progress: false

env:
  PANEL_IMAGE: ghcr.io/${{ github.repository_owner }}/kraken-panel
  AGENT_IMAGE: ghcr.io/${{ github.repository_owner }}/kraken-agent

jobs:
  panel:
    name: panel image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: derive semver from tag
        id: ver
        env:
          TAG: ${{ inputs.tag_name }}
        run: |
          echo "raw=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PANEL_IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.ver.outputs.raw }}
            type=raw,value=${{ steps.ver.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.ver.outputs.version }}
            type=sha
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: deploy/panel.Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.repository.updated_at }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=panel-image
          cache-to: type=gha,mode=max,scope=panel-image

  agent:
    name: agent image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: derive semver from tag
        id: ver
        env:
          TAG: ${{ inputs.tag_name }}
        run: |
          echo "raw=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AGENT_IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.ver.outputs.raw }}
            type=raw,value=${{ steps.ver.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.ver.outputs.version }}
            type=sha
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: deploy/agent.Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.repository.updated_at }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=agent-image
          cache-to: type=gha,mode=max,scope=agent-image
