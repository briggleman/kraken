name: steam images

# Build + publish the Linux game-server images to GHCR. Two stages:
#   deps  → downloads/primes SteamCMD (the heavy, rarely-changing part)
#   base  → COPYs SteamCMD from deps, adds runtime libs (the shipped image)
# A weekly schedule rebuilds both so nodes never run a super-stale SteamCMD.
on:
  push:
    branches: [main]
    paths:
      - "images/steam-deps/**"
      - "images/steam-base/**"
      - ".github/workflows/steam-images.yml"
    tags:
      - "steam-base-v*"
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — keep SteamCMD current
  workflow_dispatch:

env:
  DEPS_IMAGE: ghcr.io/${{ github.repository_owner }}/kraken-steam-deps
  BASE_IMAGE: ghcr.io/${{ github.repository_owner }}/kraken-steam-base

jobs:
  deps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push deps (SteamCMD download/prime)
        uses: docker/build-push-action@v6
        with:
          context: images/steam-deps
          push: true
          tags: |
            ${{ env.DEPS_IMAGE }}:latest
            ${{ env.DEPS_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=steam-deps
          cache-to: type=gha,mode=max,scope=steam-deps

  base:
    needs: deps
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BASE_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}},prefix=steam-base-v
      - name: Build + push base (COPYs SteamCMD from deps)
        uses: docker/build-push-action@v6
        with:
          context: images/steam-base
          push: true
          build-args: |
            STEAM_DEPS=${{ env.DEPS_IMAGE }}:latest
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=steam-base
          cache-to: type=gha,mode=max,scope=steam-base
