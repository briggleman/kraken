name: Abiotic Factor
slug: abiotic-factor
description: >-
  Abiotic Factor dedicated server (SteamCMD app 2857200). The server ships as a
  Windows build (Unreal Engine 5); it runs on a Windows node (steam-win image)
  or on a Linux node via Wine (steam-wine image). Server name, world save,
  player cap, and password are launch options.
# Game appid 427410 for assets; server appid 2857200 for SteamCMD. See bundled/SPECS.md.
banner_url: https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/427410/739cb7f10e53f306d066b98920aa3ab0dc552ff4/capsule_616x353.jpg?t=1783386138
icon_url: https://shared.fastly.steamstatic.com/community_assets/images/apps/427410/789cca4e4e51a6649f5728d870d3a602e3c453fe.jpg
steam_app_ids:
  windows: 2857200
platforms:
  - { kind: windows-native, image: ghcr.io/briggleman/kraken-steam-win:ltsc2022 }
  # linux-wine: same Windows depot, pulled by the LINUX SteamCMD with the
  # forced platform type, launched through Wine under headless X. The UE5
  # wrapper exe respawns itself in ways Wine dislikes — launch the
  # Win64-Shipping binary directly.
  - kind: linux-wine
    image: ghcr.io/briggleman/kraken-steam-wine:latest
    install_script: |-
      steamcmd +@sSteamCmdForcePlatformType windows +force_install_dir /data +login anonymous +app_update {{APP_ID}} validate +quit
      steamcmd +@sSteamCmdForcePlatformType windows +force_install_dir /data +login anonymous +app_update {{APP_ID}} validate +quit
    startup_command: >-
      wine-headless /data/AbioticFactor/Binaries/Win64/AbioticFactorServer-Win64-Shipping.exe -log
      -SteamServerName="{{SERVER_NAME}}" -PORT={{PORT_GAME}} -QueryPort={{PORT_QUERY}}
      -MaxServerPlayers={{MAX_PLAYERS}} -WorldSaveName={{WORLD_NAME}} -ServerPassword="{{SERVER_PASSWORD}}"
install:
  # Run app_update twice: SteamCMD can report "Missing configuration" on the
  # first pass against a fresh appinfo cache; the second pass downloads.
  script: >-
    steamcmd.exe +force_install_dir C:\data +login anonymous +app_update {{APP_ID}} validate +quit
    & steamcmd.exe +force_install_dir C:\data +login anonymous +app_update {{APP_ID}} validate +quit
startup:
  command: >-
    C:\data\AbioticFactorServer.exe -log
    -SteamServerName="{{SERVER_NAME}}" -PORT={{PORT_GAME}} -QueryPort={{PORT_QUERY}}
    -MaxServerPlayers={{MAX_PLAYERS}} -WorldSaveName={{WORLD_NAME}} -ServerPassword="{{SERVER_PASSWORD}}"
  # Logged once the session is up and joinable (verified live under wine).
  ready_regex: "Session creation completed"
  restart: { on_crash: true, max_retries: 3 }
  stop: { type: signal, value: CTRL_SHUTDOWN_EVENT }
variables:
  - { key: SERVER_NAME, label: Server name, default: "Kraken Abiotic Factor", rules: "string", user_editable: true }
  - { key: WORLD_NAME, label: World save name (no spaces), default: "Kraken", rules: "string", user_editable: true }
  - { key: MAX_PLAYERS, label: Max players, default: "6", rules: "int|min:1|max:16", user_editable: true }
  - { key: SERVER_PASSWORD, label: Server password, default: "", rules: "string", user_editable: true }
ports:
  - { name: game, protocol: udp, default: 7777, required: true }
  - { name: query, protocol: udp, default: 27015, required: true }
resources:
  min_memory_mb: 4096
  recommended_memory_mb: 8192
