<!-- @dsCard group="Components" viewport="760x470" name="Toasts" subtitle="transient operator notifications — five tones, auto-dismiss, async resolve" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--bg-abyss); font-family:var(--font-sans); padding:22px; color:var(--text-primary); }
  .wrap { display:flex; gap:22px; align-items:flex-start; }
  .panel { border-radius:var(--radius-lg); border:1px solid var(--border-subtle); background:rgba(7,23,29,.45); padding:22px; }
  .gallery { width:392px; display:flex; flex-direction:column; gap:12px; }
  .triggers { flex:1; min-width:0; }
  .lbl { font-family:var(--font-mono); font-size:11px; letter-spacing:1.5px; color:var(--text-faint); margin-bottom:14px; }
  .row { display:flex; flex-wrap:wrap; gap:10px; }
  .hint { font-family:var(--font-mono); font-size:11px; line-height:1.7; color:var(--text-faint); margin-top:18px; }
  .hint b { color:var(--text-secondary); font-weight:var(--weight-medium); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Toast, Toaster, Button } = window.AbyssalDesignSystem_6b879a;

    // static, always-visible specimens (duration 0 → no timer)
    const SPECIMENS = [
      { id: -1, tone: 'success', title: 'Server started', message: 'leviathan-01 is live · 27015/UDP' },
      { id: -2, tone: 'warning', title: 'High memory', message: 'nautilus-07 at 92% of allotted RAM' },
      { id: -3, tone: 'error', title: 'Start failed', message: 'node-02 unreachable', action: { label: 'Retry', onClick(){} } },
      { id: -4, tone: 'info', title: 'Config saved', mono: true, message: 'server.power · 2 keys changed' },
    ];

    function Demo() {
      const startFlow = () => {
        const id = Toaster.loading('Starting maelstrom-03…');
        setTimeout(() => Toaster.update(id, { tone: 'success', title: 'maelstrom-03 is live', message: 'boot 7.2s · 27015/UDP' }), 2200);
      };
      return (
        <div className="wrap">
          <div className="gallery">
            {SPECIMENS.map((t) => (
              <Toast key={t.id} toast={{ ...t, duration: 0 }} onDismiss={() => {}} />
            ))}
          </div>
          <div className="panel triggers">
            <div className="lbl">FIRE A TOAST</div>
            <div className="row">
              <Button size="sm" variant="secondary" onClick={() => Toaster.success('Server started', { message: 'leviathan-01 is live' })}>Success</Button>
              <Button size="sm" variant="secondary" onClick={() => Toaster.warning('High memory', { message: 'nautilus-07 at 92% RAM' })}>Warning</Button>
              <Button size="sm" variant="danger" onClick={() => Toaster.error('Start failed', { message: 'node-02 unreachable', action: { label: 'Retry', onClick(){} } })}>Error</Button>
              <Button size="sm" variant="ghost" onClick={() => Toaster.info('Config saved', { mono: true, message: 'server.power · 2 keys changed' })}>Info</Button>
            </div>
            <div className="lbl" style={{ marginTop: 22 }}>ASYNC · LOADING → RESOLVE</div>
            <div className="row">
              <Button size="sm" onClick={startFlow}>Start maelstrom-03</Button>
              <Button size="sm" variant="ghost" onClick={() => Toaster.dismiss()}>Clear all</Button>
            </div>
            <div className="hint">
              Mount <b>&lt;Toaster /&gt;</b> once; fire from anywhere.<br/>
              Auto-dismiss meter ticks down · <b>hover to pause</b>.
            </div>
          </div>
          <Toaster position="bottom-right" />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
